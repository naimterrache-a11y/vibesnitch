  <text x="76" y="300" font-family="Georgia,'Instrument Serif',serif" font-size="112" fill="#ECE7DA">Your app is</text>
  <text x="76" y="420" font-family="Georgia,'Instrument Serif',serif" font-size="112" font-style="italic" fill="#FFD447">hiding something.</text>
  <g font-family="'Space Grotesk',sans-serif">
