  </g>
  <g transform="translate(980,250)">
    <circle cx="80" cy="80" r="80" fill="#FF5D5D"/>
    <text x="80" y="126" text-anchor="middle" font-family="Georgia,serif" font-size="120" fill="#141414">F</text>
    <text x="80" y="200" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="20" fill="#9AA0AF">leaked key = instant F</text>
  </g>
